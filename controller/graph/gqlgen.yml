schema:
  - graph/schema.graphqls
  - graph/connector.graphqls
  - graph/shield.graphqls

exec:
  filename: graph/generated.go
  package: graph

model:
  filename: graph/models_gen.go
  package: graph

resolver:
  layout: follow-schema
  dir: graph/resolvers
  package: resolvers
  filename_template: "{name}.resolvers.go"

models:
  User:
    model: github.com/yourorg/ztna/controller/internal/models.User
  Workspace:
    model: github.com/yourorg/ztna/controller/internal/models.Workspace
  AuthInitPayload:
    model: github.com/yourorg/ztna/controller/graph/model.AuthInitPayload
