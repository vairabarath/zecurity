syntax = "proto3";

package relay.v1;

option go_package = "github.com/yourorg/ztna/controller/gen/go/proto/relay/v1;relayv1";

service RelayService {
  // Called once during Relay provisioning.
  // Uses server-authenticated TLS because the Relay has no certificate yet.
  // Provisioning-token authentication is reserved for a future implementation.
  rpc Provision(ProvisionRequest) returns (ProvisionResponse);

  // Sent periodically after provisioning.
  // Uses mTLS; Relay identity comes from the presented SPIFFE certificate.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

message ProvisionRequest {
  string provisioning_token = 1; // reserved for future authenticated provisioning; currently ignored
  string relay_id = 2; // canonical lowercase UUID; must match the requested SPIFFE URI
  bytes csr_der = 3; // DER-encoded PKCS#10 CSR; Relay private key never leaves the host
  string version = 4; // CARGO_PKG_VERSION
  string hostname = 5;

  // Operator-confirmed SAN allowlist. The Controller enforces that every DNS
  // and IP SAN in the CSR is present in these lists. Pass empty lists to
  // forbid that SAN type entirely (SPIFFE URI only).
  repeated string dns_sans = 6;
  repeated string ip_sans  = 7; // IPv4 / IPv6 in textual form (e.g. "10.0.0.5", "2001:db8::1")
}

message ProvisionResponse {
  bytes certificate_pem = 1; // Intermediate-signed Relay server leaf
  bytes intermediate_ca_pem = 2; // Platform Intermediate CA trust bundle
  string relay_id = 3; // confirmed Relay UUID
  string spiffe_id = 4; // confirmed global Relay SPIFFE identity
  int64 cert_not_after_unix = 5;
  int64 cert_not_before_unix = 6;
}

message HeartbeatRequest {
  string version = 1;
  string hostname = 2;
  uint64 uptime_seconds = 3;
  uint64 registered_connectors = 4;
  uint32 listen_port = 5; // relay's actual listener port (e.g. 9093); used to build public_addr
  uint32 connection_count = 6; // active bridged client relay streams (not registered connectors)
  uint32 max_connections = 7; // RELAY_MAX_CONNECTIONS ceiling; 0 = unset/unknown
}

message HeartbeatResponse {
  int64 server_time_unix = 1;
  uint32 next_heartbeat_seconds = 2;
}

// Connector -> Relay probe over the QUIC data path (not an RPC).
// The relay echoes request_id without registering the connection. Used for
// background latency/reachability optimization (ADR-016). Relay load is
// reported only to the controller via Heartbeat.
message ProbeRequest {
  string connector_id = 1;
  uint64 request_id = 2; // random nonce; relay must echo it for replay/correlation protection
}

message ProbeResponse {
  uint64 request_id = 1; // must match ProbeRequest.request_id or probe is treated as failed
}
