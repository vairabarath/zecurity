syntax = "proto3";

package connector.v1;

import "proto/shield/v1/shield.proto";

option go_package = "github.com/yourorg/ztna/controller/gen/go/connector/v1;connectorv1";

service ConnectorService {

  // Called once during enrollment.
  // Uses plain TLS — connector has no cert yet.
  // Connector presents enrollment JWT + PKCS#10 CSR.
  rpc Enroll(EnrollRequest) returns (EnrollResponse);

  // Called every CONNECTOR_HEARTBEAT_INTERVAL seconds after enrollment.
  // Uses mTLS — connector presents its SPIFFE-certified cert.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Called by connector when HeartbeatResponse.re_enroll=true.
  // Uses mTLS — connector presents its current (still-valid) cert.
  // Issues a fresh cert for the same SPIFFE ID, no new keypair needed.
  rpc RenewCert(RenewCertRequest) returns (RenewCertResponse);

  // Called by connector during best-effort graceful shutdown.
  rpc Goodbye(GoodbyeRequest) returns (GoodbyeResponse);
}

message EnrollRequest {
  string enrollment_token = 1;  // signed JWT — single-use enrollment token
  bytes  csr_der          = 2;  // DER-encoded PKCS#10 CSR (EC P-384)
  string version          = 3;  // CARGO_PKG_VERSION
  string hostname         = 4;
}

message EnrollResponse {
  bytes  certificate_pem      = 1;  // signed leaf cert — 7-day validity, SPIFFE SAN
  bytes  workspace_ca_pem     = 2;  // WorkspaceCA cert (PEM)
  bytes  intermediate_ca_pem  = 3;  // Intermediate CA cert (PEM)
  string connector_id         = 4;  // confirmed connector UUID
}

message HeartbeatRequest {
  string connector_id = 1;  // for logging only — NOT authoritative identity
  string version      = 2;  // CARGO_PKG_VERSION
  string hostname     = 3;
  string public_ip    = 4;  // optional
  repeated ShieldHealth shields = 5;
  string lan_addr     = 6;  // connector's LAN address shields use to connect (e.g. 192.168.1.10:9091)
  repeated shield.v1.ResourceAck resource_acks = 7;  // forwarded from all shields on this connector
}

message HeartbeatResponse {
  bool   ok             = 1;
  string latest_version = 2;  // controller informs connector of latest release
  bool   re_enroll      = 3;  // true when cert expiring soon, connector should call RenewCert
  // keyed by shield_id → list of pending resource instructions for that shield
  map<string, ShieldResourceInstructions> shield_resources = 4;
}

message ShieldResourceInstructions {
  repeated shield.v1.ResourceInstruction instructions = 1;
}

message RenewCertRequest {
  string connector_id = 1;  // for logging only — identity comes from mTLS cert
  bytes  public_key_der = 2;  // connector's existing EC P-384 public key (DER)
}

message RenewCertResponse {
  bytes certificate_pem = 1;        // fresh 7-day cert, same SPIFFE SAN
  bytes workspace_ca_pem = 2;      // WorkspaceCA (may not have changed, but send anyway)
  bytes intermediate_ca_pem = 3;     // Intermediate CA
}

message GoodbyeRequest {
  string connector_id = 1;
}

message GoodbyeResponse {
  bool ok = 1;
}

message ShieldHealth {
  string shield_id         = 1;
  string status            = 2;
  string version           = 3;
  int64 last_heartbeat_at  = 4;
  string lan_ip            = 5;  // shield's auto-detected LAN IP (RFC-1918), empty if unknown
}
