syntax = "proto3";

package connector.v1;

import "proto/client/v1/client.proto";
import "proto/shield/v1/shield.proto";

option go_package = "github.com/yourorg/ztna/controller/gen/go/connector/v1;connectorv1";

service ConnectorService {
  // Called once during enrollment.
  // Uses plain TLS — connector has no cert yet.
  // Connector presents enrollment JWT + PKCS#10 CSR.
  rpc Enroll(EnrollRequest) returns (EnrollResponse);

  // Persistent bidirectional control stream.
  // Connector establishes stream on startup; controller pushes resource
  // instructions in real time; connector streams health and acks back.
  // Uses mTLS — connector presents its SPIFFE-certified cert.
  rpc Control(stream ConnectorControlMessage) returns (stream ConnectorControlMessage);

  // Called when re_enroll arrives on the Control stream.
  // Uses mTLS — connector presents its current (still-valid) cert.
  rpc RenewCert(RenewCertRequest) returns (RenewCertResponse);

  // Called by connector during best-effort graceful shutdown.
  rpc Goodbye(GoodbyeRequest) returns (GoodbyeResponse);
}

message EnrollRequest {
  string enrollment_token = 1; // signed JWT — single-use enrollment token
  bytes csr_der = 2; // DER-encoded PKCS#10 CSR (EC P-384)
  string version = 3; // CARGO_PKG_VERSION
  string hostname = 4;
}

message EnrollResponse {
  bytes certificate_pem = 1; // signed leaf cert — 7-day validity, SPIFFE SAN
  bytes workspace_ca_pem = 2; // WorkspaceCA cert (PEM)
  bytes intermediate_ca_pem = 3; // Intermediate CA cert (PEM)
  string connector_id = 4; // confirmed connector UUID
}

message ShieldResourceInstructions {
  repeated shield.v1.ResourceInstruction instructions = 1;
}

message RenewCertRequest {
  string connector_id = 1; // for logging only — identity comes from mTLS cert
  bytes public_key_der = 2; // connector's existing EC P-384 public key (DER)
}

message RenewCertResponse {
  bytes certificate_pem = 1; // fresh 7-day cert, same SPIFFE SAN
  bytes workspace_ca_pem = 2; // WorkspaceCA (may not have changed, but send anyway)
  bytes intermediate_ca_pem = 3; // Intermediate CA
}

message GoodbyeRequest {
  string connector_id = 1;
}

message GoodbyeResponse {
  bool ok = 1;
}

// ── Control stream messages ──────────────────────────────────────────────────

message ConnectorControlMessage {
  oneof body {
    // Controller → Connector
    ResourceInstructionBatch resource_instructions = 1;
    shield.v1.ReEnrollSignal re_enroll = 2;
    shield.v1.Ping ping = 3;
    // Connector → Controller
    ConnectorHealthReport connector_health = 4;
    ShieldStatusBatch shield_status = 5;
    ResourceAckBatch resource_acks = 6;
    shield.v1.Pong pong = 7;
    ShieldDiscoveryBatch shield_discovery = 8;
    ScanReport scan_report = 9;
    // Controller → Connector
    ScanCommand scan_command = 10;
    // Controller → Connector
    client.v1.ACLSnapshot acl_snapshot = 11;
    // Connector → Controller
    ConnectorLog connector_log = 12;
    // Controller → Connector
    ResourceSnapshotBatch resource_snapshots = 13;
    // Connector → Controller
    ResourceStateBatch resource_state = 14;
    // Connector → Controller — lifecycle transition for relay attachment.
    // Sent on attach/detach; the same state is also re-asserted in every
    // ConnectorHealthReport so a lost message self-heals within one
    // heartbeat interval.
    ConnectorRelayState relay_state = 15;
    // Field 16 reserved for TransportSnapshot (ADR-015).
    // Controller → Connector — eligible relay pool with capacity labels (ADR-016).
    LabelledRelayList relay_list = 17;
  }
}

message ConnectorLog {
  string connector_id = 1;
  string message = 2; // e.g. "dest=192.168.1.10:443 path=direct allowed"
  string resource_id = 3;
  string client_spiffe_id = 4;
  string route_type = 5; // "connector" or "shield"; empty when no ACL entry matched
  string destination = 6;
  uint32 port = 7;
  string protocol = 8;
  string action = 9; // "allow", "deny", or "error"
  string error = 10;
  int64 occurred_at_unix = 11;
}

message ResourceInstructionBatch {
  // keyed by shield_id → instructions for that shield
  map<string, ShieldResourceInstructions> shield_resources = 1;
}

message ResourceSnapshotBatch {
  // keyed by shield_id → resource snapshot for that shield
  map<string, shield.v1.ResourceSnapshot> shield_snapshots = 1;
}

// Shield actual-state reports forwarded upstream (ADR-004 Phase 3).
// Buffered latest-wins on the connector, flushed on the health tick.
message ResourceStateBatch {
  repeated shield.v1.ResourceStateReport reports = 1;
}

message ConnectorHealthReport {
  string version = 1;
  string hostname = 2;
  string public_ip = 3;
  string lan_addr = 4;
  uint64 acl_version = 5; // connector's currently loaded ACL snapshot version; 0 means none

  // Sprint 10.4 — connector reports its current relay attachment so the
  // controller can keep connector_relay_placement up to date even if a
  // ConnectorRelayState transition message was lost. Empty relay_id means
  // "not currently attached to any relay".
  string relay_id               = 6;
  string relay_spiffe_id        = 7; // optional, for debug / cross-check
  int64  relay_attached_at_unix = 8; // unix seconds; 0 when not attached
}

// Sent on the existing Control stream whenever the connector's relay
// attachment state changes (connect, disconnect, switch). The controller
// trusts connector_id from the authenticated cert SAN — never from this
// body. Heartbeat re-asserts the same state, so a lost transition is
// recovered within one heartbeat interval.
message ConnectorRelayState {
  string connector_id      = 1; // controller cross-checks against cert SAN
  string relay_id          = 2; // empty for "detached"
  string relay_spiffe_id   = 3; // optional
  int64  observed_at_unix  = 4; // connector-local time of the transition
  string reason            = 5; // "connected", "disconnected", "switched", ...
}

// Controller-assigned capacity tier for a relay (ADR-016). Exhausted relays
// are dropped from LabelledRelayList entirely, so only High/Medium appear here.
enum RelayCapacityLabel {
  RELAY_CAPACITY_HIGH   = 0;
  RELAY_CAPACITY_MEDIUM = 1;
}

message LabelledRelayInfo {
  string             relay_id   = 1;
  string             relay_addr = 2; // host:9093
  string             spiffe_id  = 3;
  RelayCapacityLabel label      = 4;
}

// Controller → Connector pushed pool of eligible relays. version is monotonic;
// the connector skips re-probing when version is unchanged.
message LabelledRelayList {
  repeated LabelledRelayInfo relays  = 1;
  uint64                     version = 2;
}

message ShieldStatusUpdate {
  string shield_id = 1;
  string status = 2;
  string version = 3;
  string lan_ip = 4;
  int64 last_seen_unix = 5;
}

message ShieldStatusBatch {
  repeated ShieldStatusUpdate shields = 1;
}

message ResourceAckBatch {
  repeated shield.v1.ResourceAck acks = 1;
}

message ShieldDiscoveryReport {
  string shield_id = 1;
  shield.v1.DiscoveryReport report = 2;
}

message ShieldDiscoveryBatch {
  repeated ShieldDiscoveryReport reports = 1;
}

message ScanCommand {
  string request_id = 1; // UUID — client uses this to poll results
  repeated string targets = 2; // IPs or CIDRs (e.g. "192.168.1.0/24")
  repeated uint32 ports = 3; // ports to probe (max 16)
  uint32 max_targets = 4; // hard cap, default 512
  uint32 timeout_sec = 5; // per-target timeout, default 5, max 60
}

message ScanResult {
  string ip = 1;
  uint32 port = 2;
  string protocol = 3; // "tcp"
  string service_name = 4;
  uint64 first_seen = 5; // unix timestamp
  string reachable_from = 6; // connector_id that ran the scan
}

message ScanReport {
  string request_id = 1;
  repeated ScanResult results = 2;
  string error = 3; // set only on scan-level errors
}
