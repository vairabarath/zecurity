syntax = "proto3";

package client.v1;

option go_package = "github.com/yourorg/ztna/controller/gen/go/proto/client/v1;clientv1";

service ClientService {
  // GetAuthConfig — public, no auth. CLI calls this first to get Google OAuth config.
  rpc GetAuthConfig(GetAuthConfigRequest) returns (GetAuthConfigResponse);

  // InitiateAuth — registers a PKCE auth session on the controller and returns
  // the complete Google OAuth URL for the CLI to open in the browser.
  // The controller's fixed callback URL is embedded in the returned auth_url.
  rpc InitiateAuth(InitiateAuthRequest) returns (InitiateAuthResponse);

  // TokenExchange — exchange the controller one-time ctrl_code for a Zecurity
  // JWT + refresh token. Verifies CLI-Controller PKCE (code_verifier vs
  // the code_challenge registered in InitiateAuth).
  // If invite_token is set, accepts the invitation and adds user to workspace as MEMBER.
  rpc TokenExchange(TokenExchangeRequest) returns (TokenExchangeResponse);

  // EnrollDevice — issue mTLS certificate for the client device.
  // Requires valid access_token in request (not in gRPC metadata).
  rpc EnrollDevice(EnrollDeviceRequest) returns (EnrollDeviceResponse);

  // GetACLSnapshot — returns the workspace ACL snapshot for the calling client.
  // Validates access_token and device_id; default-deny if either is invalid.
  rpc GetACLSnapshot(GetACLSnapshotRequest) returns (GetACLSnapshotResponse);
}

// ── GetAuthConfig ──────────────────────────────────────────────────────────

message GetAuthConfigRequest {
  string workspace_slug = 1;
}

message GetAuthConfigResponse {
  string google_client_id = 1;
  string auth_endpoint    = 2;
  string token_endpoint   = 3;
  string controller_host  = 4;
}

// ── InitiateAuth ───────────────────────────────────────────────────────────

message InitiateAuthRequest {
  string workspace_slug     = 1;
  string code_challenge     = 2;  // BASE64URL(SHA256(cli_code_verifier)), no padding
  string local_redirect_uri = 3;  // http://127.0.0.1:<port>/callback — CLI local server
}

message InitiateAuthResponse {
  string auth_url   = 1;  // complete Google OAuth URL — open in browser
  string session_id = 2;  // opaque token passed back in TokenExchange
}

// ── TokenExchange ──────────────────────────────────────────────────────────

message TokenExchangeRequest {
  reserved 1;               // was: workspace_slug (now carried by session_id)
  reserved "workspace_slug";
  string ctrl_code     = 2; // controller-issued one-time code from /api/clients/callback
  string code_verifier = 3; // CLI PKCE verifier — controller checks SHA256 == code_challenge
  reserved 4;               // was: redirect_uri (no longer needed)
  reserved "redirect_uri";
  string invite_token  = 5; // optional — accept a workspace invitation
  string session_id    = 6; // from InitiateAuthResponse
}

message TokenExchangeResponse {
  string access_token  = 1;
  string refresh_token = 2;
  int64  expires_in    = 3;
  string email         = 4;
}

// ── EnrollDevice ───────────────────────────────────────────────────────────

message EnrollDeviceRequest {
  string access_token = 1;
  string csr_pem      = 2;
  string device_name  = 3;
  string os           = 4;
}

message EnrollDeviceResponse {
  string certificate_pem     = 1;
  string workspace_ca_pem    = 2;
  string intermediate_ca_pem = 3;
  string spiffe_id           = 4;
  string device_id           = 5;
}

// ── GetACLSnapshot ─────────────────────────────────────────────────────────

message GetACLSnapshotRequest {
  string access_token = 1;
  string device_id    = 2;
}

message GetACLSnapshotResponse {
  ACLSnapshot snapshot = 1;
}

// ACLConnector holds the tunnel endpoint for one Connector instance.
message ACLConnector {
  string connector_id          = 1;
  string connector_tunnel_addr = 2; // host:9092 QUIC
  string connector_spiffe      = 3;
  // Transitional — Track A (ADR-014). Track B (ADR-015) moves relay routing
  // to TransportSnapshot; reserve fields 4 and 5 at that point, never reuse.
  string relay_addr            = 4; // relay QUIC address for this connector; empty = no relay
  string relay_spiffe_id       = 5; // SPIFFE URI of the relay this connector is registered with
}

// ACLRemoteNetwork groups the connectors serving a single remote network.
// Connectors is empty when no active connector currently exists for this
// remote network. The client must treat resources in this network as
// temporarily unavailable.
message ACLRemoteNetwork {
  string remote_network_id         = 1;
  string name                      = 2;
  repeated ACLConnector connectors = 3;
}

message ACLSnapshot {
  uint64 version                            = 1;
  string workspace_id                       = 2;
  int64  generated_at                       = 3;
  repeated ACLEntry entries                 = 4;
  reserved 5;                               // was: connector_tunnel_addr
  string relay_addr                         = 6; // relay QUIC public address, e.g. "relay.example.com:9093"
  reserved 7;                               // was: connector_id
  reserved 8;                               // was: connector_spiffe
  string relay_spiffe_id                    = 9; // SPIFFE URI of the relay. Required whenever relay_addr is set.
  repeated ACLRemoteNetwork remote_networks = 10;
}

message ACLEntry {
  string resource_id                 = 1;
  string address                     = 2;
  uint32 port                        = 3;
  string protocol                    = 4;
  repeated string allowed_spiffe_ids = 5;
  string name                        = 6;
  string route_type                  = 7; // "connector" or "shield"
  string shield_id                   = 8; // set when route_type == "shield"
  string remote_network_id           = 9; // routing reference — look up ACLRemoteNetwork to find connectors
  string preferred_connector_id      = 10; // set for shield routes when the Shield's current Connector is known
}
