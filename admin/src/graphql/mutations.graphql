mutation InitiateAuth($provider: String!, $workspaceName: String) {
  initiateAuth(provider: $provider, workspaceName: $workspaceName) {
    redirectUrl
    state
  }
}

mutation CreateRemoteNetwork($name: String!, $location: NetworkLocation!) {
  createRemoteNetwork(name: $name, location: $location) {
    id
    name
    location
    status
    createdAt
  }
}

mutation DeleteRemoteNetwork($id: ID!) {
  deleteRemoteNetwork(id: $id)
}

mutation GenerateConnectorToken($remoteNetworkId: ID!, $connectorName: String!) {
  generateConnectorToken(remoteNetworkId: $remoteNetworkId, connectorName: $connectorName) {
    connectorId
    installCommand
  }
}

mutation RevokeConnector($id: ID!) {
  revokeConnector(id: $id)
}

mutation DeleteConnector($id: ID!) {
  deleteConnector(id: $id)
}

mutation GenerateShieldToken($remoteNetworkId: ID!, $shieldName: String!) {
  generateShieldToken(remoteNetworkId: $remoteNetworkId, shieldName: $shieldName) {
    shieldId
    installCommand
  }
}

mutation RevokeShield($id: ID!) {
  revokeShield(id: $id)
}

mutation DeleteShield($id: ID!) {
  deleteShield(id: $id)
}

mutation CreateResource($input: CreateResourceInput!) {
  createResource(input: $input) {
    id
    name
    description
    host
    protocol
    portFrom
    portTo
    status
    shield {
      id
      name
    }
  }
}

mutation UpdateResource($id: ID!, $input: UpdateResourceInput!) {
  updateResource(id: $id, input: $input) {
    id
    name
    description
    protocol
    portFrom
    portTo
    status
  }
}

mutation ProtectResource($id: ID!) {
  protectResource(id: $id) {
    id
    status
  }
}

mutation UnprotectResource($id: ID!) {
  unprotectResource(id: $id) {
    id
    status
  }
}

mutation DeleteResource($id: ID!) {
  deleteResource(id: $id)
}

mutation PromoteDiscoveredService($shieldId: ID!, $protocol: String!, $port: Int!) {
  promoteDiscoveredService(shieldId: $shieldId, protocol: $protocol, port: $port) {
    id
    name
    status
  }
}

mutation TriggerScan($connectorId: ID!, $targets: [String!]!, $ports: [Int!]!) {
  triggerScan(connectorId: $connectorId, targets: $targets, ports: $ports)
}

mutation RevokeDevice($deviceId: ID!) {
  revokeDevice(deviceId: $deviceId)
}

mutation CreateInvitation($email: String!) {
  createInvitation(email: $email) {
    id
    email
    status
    expiresAt
    createdAt
  }
}

mutation CreateGroup($name: String!, $description: String) {
  createGroup(name: $name, description: $description) {
    id
    name
    description
    createdAt
    updatedAt
  }
}

mutation UpdateGroup($id: ID!, $name: String, $description: String) {
  updateGroup(id: $id, name: $name, description: $description) {
    id
    name
    description
    updatedAt
  }
}

mutation DeleteGroup($id: ID!) {
  deleteGroup(id: $id)
}

mutation AddGroupMember($groupId: ID!, $userId: ID!) {
  addGroupMember(groupId: $groupId, userId: $userId) {
    id
    members {
      id
      email
      role
    }
  }
}

mutation RemoveGroupMember($groupId: ID!, $userId: ID!) {
  removeGroupMember(groupId: $groupId, userId: $userId) {
    id
    members {
      id
      email
      role
    }
  }
}

mutation AssignResourceToGroup($resourceId: ID!, $groupId: ID!) {
  assignResourceToGroup(resourceId: $resourceId, groupId: $groupId) {
    id
    groups {
      id
      name
    }
  }
}

mutation UnassignResourceFromGroup($resourceId: ID!, $groupId: ID!) {
  unassignResourceFromGroup(resourceId: $resourceId, groupId: $groupId) {
    id
    groups {
      id
      name
    }
  }
}
