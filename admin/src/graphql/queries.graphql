query LookupWorkspace($slug: String!) {
  lookupWorkspace(slug: $slug) {
    found
    workspace {
      id
      name
      slug
    }
  }
}

query LookupWorkspacesByEmail($email: String!) {
  lookupWorkspacesByEmail(email: $email) {
    workspaces {
      id
      name
      slug
    }
  }
}

query Me {
  me {
    id
    email
    role
    provider
    createdAt
  }
}

query GetWorkspace {
  workspace {
    id
    slug
    name
    status
    createdAt
  }
}

query GetRemoteNetworks {
  remoteNetworks {
    id
    name
    location
    status
    createdAt
    networkHealth
    connectors {
      id
      name
      status
      lastSeenAt
      version
      hostname
      publicIp
      lanAddr
      certNotAfter
      createdAt
    }
    shields {
      id
      name
      status
      lastSeenAt
      hostname
      interfaceAddr
      connectorId
    }
  }
}

query GetConnectors($remoteNetworkId: ID!) {
  connectors(remoteNetworkId: $remoteNetworkId) {
    id
    name
    status
    lastSeenAt
    version
    hostname
    publicIp
    lanAddr
    certNotAfter
    createdAt
  }
}

query GetConnector($id: ID!) {
  connector(id: $id) {
    id
    name
    status
    lastSeenAt
    version
    hostname
    publicIp
    lanAddr
    certNotAfter
    createdAt
    remoteNetworkId
  }
}

query GetRemoteNetwork($id: ID!) {
  remoteNetwork(id: $id) {
    id
    name
    location
    status
  }
}

query GetShields($remoteNetworkId: ID!) {
  shields(remoteNetworkId: $remoteNetworkId) {
    id
    name
    status
    lastSeenAt
    version
    hostname
    interfaceAddr
    connectorId
  }
}

query GetShield($id: ID!) {
  shield(id: $id) {
    id
    name
    status
    lastSeenAt
    version
    hostname
    lanIp
    interfaceAddr
    certNotAfter
    createdAt
    connectorId
    remoteNetworkId
  }
}

query GetAllResources {
  allResources {
    id
    name
    description
    host
    protocol
    portFrom
    portTo
    status
    errorMessage
    appliedAt
    lastVerifiedAt
    createdAt
    shield {
      id
      name
      status
      lanIp
    }
    remoteNetwork {
      id
      name
    }
  }
}

query GetDiscoveredServices($shieldId: ID!) {
  getDiscoveredServices(shieldId: $shieldId) {
    shieldId
    protocol
    port
    boundIp
    serviceName
    firstSeen
    lastSeen
  }
}

query GetScanResults($requestId: String!) {
  getScanResults(requestId: $requestId) {
    requestId
    ip
    port
    protocol
    serviceName
    reachableFrom
    firstSeen
  }
}

query GetInvitation($token: String!) {
  invitation(token: $token) {
    id
    email
    status
    expiresAt
    createdAt
  }
}

query MyDevices {
  myDevices {
    id
    name
    os
    spiffeId
    certNotAfter
    lastSeenAt
    createdAt
  }
}

query GetResources($remoteNetworkId: String!) {
  resources(remoteNetworkId: $remoteNetworkId) {
    id
    name
    description
    host
    protocol
    portFrom
    portTo
    status
    errorMessage
    lastVerifiedAt
    appliedAt
    createdAt
    shield {
      id
      name
      status
    }
  }
}
