# Build & release the Zecurity connector binary for Linux amd64 + arm64.
#
# Trigger: push a tag matching "connector-v*"  (e.g. connector-v1.0.0)
#
# Jobs:
#   build-amd64  — cross-compile x86_64 binary on GitHub runner
#   build-arm64  — cross-compile aarch64 binary on GitHub runner
#   release      — collect all artifacts + upload to GitHub Release
#
# Assets uploaded to the release:
#   connector-linux-amd64              — x86_64 binary
#   connector-linux-arm64              — ARM64 binary
#   checksums.txt                      — SHA-256 of both binaries
#   connector-install.sh               — installer script
#   zecurity-connector.service         — systemd main unit
#   zecurity-connector-update.service  — systemd updater unit
#   zecurity-connector-update.timer    — systemd daily timer

name: Build & Release Connector

on:
  push:
    tags:
      - "connector-v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

# ────────────────────────────────────────────────────────
# Job 1: Build for Linux x86_64 (amd64)
# ────────────────────────────────────────────────────────
build-amd64:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry & build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          connector/target
        key: ${{ runner.os }}-cargo-amd64-${{ hashFiles('connector/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-amd64-

    - name: Build release binary (amd64)
      working-directory: connector
      run: cargo build --release

    - name: Rename binary
      run: |
        cp connector/target/release/zecurity-connector \
           connector-linux-amd64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: connector-linux-amd64
        path: connector-linux-amd64

# ────────────────────────────────────────────────────────
# Job 2: Build for Linux ARM64 (aarch64)
# ────────────────────────────────────────────────────────
build-arm64:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-unknown-linux-gnu

    - name: Install cross-compilation tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

    - name: Cache cargo registry & build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          connector/target
        key: ${{ runner.os }}-cargo-arm64-${{ hashFiles('connector/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-arm64-

    - name: Configure cargo for cross-compilation
      run: |
        mkdir -p .cargo
        printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' > .cargo/config.toml

    - name: Build release binary (arm64)
      working-directory: connector
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      run: cargo build --release --target aarch64-unknown-linux-gnu

    - name: Rename binary
      run: |
        cp connector/target/aarch64-unknown-linux-gnu/release/zecurity-connector \
           connector-linux-arm64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: connector-linux-arm64
        path: connector-linux-arm64

# ────────────────────────────────────────────────────────
# Job 3: Create GitHub Release & upload all assets
# ────────────────────────────────────────────────────────
release:
  needs: [build-amd64, build-arm64]
  runs-on: ubuntu-latest
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download amd64 binary
      uses: actions/download-artifact@v4
      with:
        name: connector-linux-amd64
        path: release-assets/

    - name: Download arm64 binary
      uses: actions/download-artifact@v4
      with:
        name: connector-linux-arm64
        path: release-assets/

    - name: Copy install script & systemd units
      run: |
        cp connector/scripts/connector-install.sh          release-assets/connector-install.sh
        cp connector/systemd/zecurity-connector.service             release-assets/
        cp connector/systemd/zecurity-connector-update.service       release-assets/
        cp connector/systemd/zecurity-connector-update.timer         release-assets/

    - name: Generate checksums
      working-directory: release-assets
      run: |
        sha256sum connector-linux-amd64 connector-linux-arm64 > checksums.txt
        echo "── checksums.txt ──"
        cat checksums.txt

    - name: Make binaries & script executable
      working-directory: release-assets
      run: |
        chmod +x connector-linux-amd64
        chmod +x connector-linux-arm64
        chmod +x connector-install.sh

    - name: List all release assets
      run: ls -lah release-assets/

    - name: Create GitHub Release & upload assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Connector ${{ github.ref_name }}
        body: |
          ## Zecurity Connector ${{ github.ref_name }}

          ### Assets
          | File | Description |
          |------|-------------|
          | `connector-linux-amd64` | Linux x86_64 binary |
          | `connector-linux-arm64` | Linux ARM64 binary |
          | `checksums.txt` | SHA-256 checksums |
          | `connector-install.sh` | Installer script |
          | `zecurity-connector.service` | systemd main service |
          | `zecurity-connector-update.service` | systemd updater service |
          | `zecurity-connector-update.timer` | systemd daily update timer |

          ### Quick Install
          ```bash
          curl -fsSL https://github.com/vairabarath/zecurity/releases/latest/download/connector-install.sh | \
            sudo CONTROLLER_ADDR=host:9090 CONTROLLER_HTTP_ADDR=host:8080 ENROLLMENT_TOKEN=eyJ... bash
          ```
        draft: false
        prerelease: false
        files: |
          release-assets/connector-linux-amd64
          release-assets/connector-linux-arm64
          release-assets/checksums.txt
          release-assets/connector-install.sh
          release-assets/zecurity-connector.service
          release-assets/zecurity-connector-update.service
          release-assets/zecurity-connector-update.timer
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
