name: Build & Release Connector

on:
  push:
    tags:
      - "connector-v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler zig

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            connector/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('connector/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binaries
        working-directory: connector
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-musl
          cargo zigbuild --release --target aarch64-unknown-linux-musl

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp connector/target/x86_64-unknown-linux-musl/release/zecurity-connector release-assets/connector-linux-amd64
          cp connector/target/aarch64-unknown-linux-musl/release/zecurity-connector release-assets/connector-linux-arm64
          cp connector/scripts/connector-install.sh release-assets/connector-install.sh
          cp connector/systemd/zecurity-connector.service release-assets/
          cp connector/systemd/zecurity-connector-update.service release-assets/
          cp connector/systemd/zecurity-connector-update.timer release-assets/
          chmod +x release-assets/connector-linux-amd64
          chmod +x release-assets/connector-linux-arm64
          chmod +x release-assets/connector-install.sh

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum connector-linux-amd64 connector-linux-arm64 > checksums.txt

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Connector ${{ github.ref_name }}
          body: |
            ## Zecurity Connector ${{ github.ref_name }}

            ### Install (Linux hosts)
            ```bash
            curl -fsSL https://github.com/vairabarath/zecurity/releases/latest/download/connector-install.sh | \
              sudo CONTROLLER_ADDR=host:9090 CONTROLLER_HTTP_ADDR=host:8080 ENROLLMENT_TOKEN=eyJ... bash
            ```
          files: |
            release-assets/connector-linux-amd64
            release-assets/connector-linux-arm64
            release-assets/checksums.txt
            release-assets/connector-install.sh
            release-assets/zecurity-connector.service
            release-assets/zecurity-connector-update.service
            release-assets/zecurity-connector-update.timer
